name: Build and Deploy Spring Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: springservice
  APP_DIR: /home/ec2-user/spring

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS Auth
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Docker setup
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Set image URI
      - name: Set Image URI
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:$IMAGE_TAG
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 6. Build & Push
      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --no-cache \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE_URI \
            --push .

      # 7. Deploy via SSM
      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy spring service" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ap-south-2 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com",
              "cd /home/ec2-user/spring",
              "docker-compose down --remove-orphans || true",
              "docker rm -f spring-api || true",
              "docker images | grep springservice | awk \"{print \\$3}\" | xargs -r docker rmi -f",
              "docker pull '${{ env.IMAGE_URI }}'",
              "IMAGE_TAG=${{ env.IMAGE_TAG }} docker-compose up -d --force-recreate",
              "docker ps",
              "docker images | grep springservice"
            ]'
